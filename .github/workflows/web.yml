# This workflow will build and push a .NET Core app to an Azure Web App when a commit is pushed to your default branch.
#
# To configure this workflow:
#
# 1. Download the Publish Profile for your Azure Web App from the Azure Portal
# 2. Create a secret in your repository named AZURE_WEBAPP_PUBLISH_PROFILE, paste the publish profile contents as the value
# 3. Update the AZURE_WEBAPP_NAME below with your actual Web App name
#
# Generated automatically by PowerShell script on 07/09/2025 22:17:01
name: Build and deploy Web App

env:
  AZURE_WEBAPP_NAME: wiyumiyuAppsServiceWeb
  DOTNET_VERSION: '8.0'

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'Vehiculo.API/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore Vehiculos.WEB/Vehiculos.WEB.sln

      - name: Build
        run: dotnet build Vehiculos.WEB/Vehiculos.WEB.sln --configuration Release --no-restore

      - name: Publish
        run: dotnet publish Vehiculos.WEB/Web/Web.csproj -c Release -o ./publish --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: ProductionWeb
      url: ${{ steps.deploy.outputs.webapp-url }}

    steps:

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: ./publish

      - name: Deploy to Azure Web App
        id: deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBIAPP_PUBLISH_PROFILE }}
          package: ./publish
